services:
  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    container_name: mcp-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
    depends_on:
      - postgres
      - redis
    env_file:
      - ../apps/web/.env.docker

  postgres:
    image: postgres:16
    container_name: mcp-postgres
    restart: always
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
      POSTGRES_DB: mcp_chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mcp-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
